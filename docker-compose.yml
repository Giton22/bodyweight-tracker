services:
  pocketbase:
    build: .
    container_name: bodyweight-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      # Set these in your .env file to auto-create the admin account on first boot.
      # The superuser upsert command is idempotent, so it's safe to leave them set.
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-}
    volumes:
      - pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pb_data:
