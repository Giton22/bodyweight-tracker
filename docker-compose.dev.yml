# Development override — builds the image locally instead of pulling from GHCR.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# This is intended for contributors and anyone who wants to build from source.
# Self-hosters should use docker-compose.yml on its own (pulls the pre-built image).

services:
  bodyweight-tracker:
    image: bodyweight-tracker:dev
    build:
      context: .
      dockerfile: Dockerfile
